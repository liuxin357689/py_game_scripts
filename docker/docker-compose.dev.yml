# ============================================
# Game Scripts - 开发环境 Docker Compose
# ============================================
# 用途: 启动开发容器，IDEA Ultimate 连接 Docker Interpreter
# 启动: docker compose -f docker/docker-compose.dev.yml up -d
# ============================================

version: '3'

services:
  game-scripts-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: game-scripts-dev
    volumes:
      # 挂载整个项目根目录（开发时实时同步）
      - ..:/app
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    # 保持容器运行
    command: tail -f /dev/null
    restart: unless-stopped
